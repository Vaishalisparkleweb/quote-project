name: CI/CD - Build, Test, Push & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  USER_IMAGE: vaishali8160/quote-backend-user-service
  CATEGORY_IMAGE: vaishali8160/quote-backend-category-service
  QUOTE_IMAGE: vaishali8160/quote-backend-quote-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install service dependencies
        run: |
          cd category-service && npm install
          cd ../quote-service && npm install
          cd ../user-service && npm install

      - name: Run tests
        run: |
          cd category-service && npm test || true
          cd ../quote-service && npm test || true
          cd ../user-service && npm test || true

  build-push-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push user-service
        uses: docker/build-push-action@v6
        with:
          context: ./user-service-net
          file: ./user-service-net/Dockerfile
          push: true
          tags: ${{ env.USER_IMAGE }}:latest

      - name: Build and push category-service
        uses: docker/build-push-action@v6
        with:
          context: ./category-service
          push: true
          tags: ${{ env.CATEGORY_IMAGE }}:latest

      - name: Build and push quote-service
        uses: docker/build-push-action@v6
        with:
          context: ./quote-service
          push: true
          tags: ${{ env.QUOTE_IMAGE }}:latest

      - name: Copy compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: "/opt/quote-backend"

      - name: Copy deploy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/nginx.conf,deploy/deploy.sh"
          target: "/opt/quote-backend/deploy"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/quote-backend
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
